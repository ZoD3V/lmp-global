name: 🚀 Deploy website on push

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest

    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    # Set up Node.js for React frontend
    - name: Use Node.js 23.6.0
      uses: actions/setup-node@v4
      with:
        node-version: '23.6.0'

    # Cache Node.js dependencies
    - name: Cache Node.js dependencies
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-npm-

    # Build the React.js Project (for production)
    - name: 🔨 Build React Project
      run: |
        npm install
        npm run build   # Use 'npm run build' for production

    # Set up PHP and Composer for Laravel backend
    - name: Install PHP and Composer
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        tools: 'composer'

    # Cache Composer dependencies
    - name: Cache Composer dependencies
      uses: actions/cache@v4
      with:
        path: ~/.composer/cache
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-

    # Install Laravel dependencies
    - name: Install PHP dependencies
      run: composer install --no-dev --optimize-autoloader --no-interaction

    # Sync the files to your FTP server
    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.SERVER }}
        username: ${{ secrets.USERNAME }}
        password: ${{ secrets.PASSWORD }}
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
